name = "palatable-inbound-email"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Email Worker — invoked by Cloudflare Email Routing on the
# mail.palateandpen.co.uk subdomain. Receives the raw RFC-822 message,
# parses MIME, extracts attachments, and POSTs JSON to /api/inbound-email.
#
# Routing is wired up in the Cloudflare dashboard:
#   Email → Email Routing → Routing rules
#   Catch-all (*@mail.palateandpen.co.uk) → Send to Worker → palatable-inbound-email
#
# Secrets (set via `npx wrangler secret put NAME`):
#   INBOUND_EMAIL_SECRET  — shared with the Vercel env of the same name
#                           so the webhook's bearer-auth check passes.

[vars]
WEBHOOK_URL = "https://app.palateandpen.co.uk/api/inbound-email"
