<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Palatable — Onboarding</title><link href="https://fonts.googleapis.com/css2?family=Cormorant_Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@600&family=Jost:wght@400;600&display=swap" rel="stylesheet"><style>:root{--paper:#F8F4ED;--card:#FFFFFF;--ink:#1A1612;--muted:#7A6F5E;--gold:#B8923C;--rule:rgba(26,22,18,0.08);}*{box-sizing:border-box;margin:0;padding:0;}body{background:var(--paper);color:var(--ink);font-family:'Jost',sans-serif;}.page{padding:48px 56px 80px;max-width:600px;margin:0 auto;}.progress{height:4px;background:var(--rule);margin-bottom:40px;}.progress-bar{height:100%;background:var(--gold);width:60%;}.step-title{font-family:'Cormorant_Garamond',serif;font-size:36px;margin-bottom:12px;}.step-sub{font-family:'Cormorant_Garamond',serif;font-style:italic;font-size:14px;color:var(--muted);margin-bottom:24px;}.form-group{margin-bottom:20px;}.form-label{font-family:'Cinzel',serif;font-weight:600;font-size:9px;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:8px;display:block;}.form-input{width:100%;padding:12px;border:1px solid var(--rule);font-family:'Jost',sans-serif;font-size:14px;}.form-actions{display:flex;gap:12px;margin-top:32px;}.btn{font-family:'Cinzel',serif;font-weight:600;font-size:8px;letter-spacing:0.3em;padding:12px 24px;text-transform:uppercase;cursor:pointer;border:none;}.btn-primary{background:var(--gold);color:white;flex:1;}.btn-secondary{background:transparent;border:1px solid var(--rule);color:var(--muted);}.skip-link{display:block;margin-top:16px;text-align:center;font-family:'Cormorant_Garamond',serif;font-size:12px;color:var(--gold);text-decoration:none;}</style></head><body><div class="page"><div class="progress"><div class="progress-bar"></div></div><div class="step-title">Kitchen Name</div><div class="step-sub">Step 1 of 5 · what's your kitchen called?</div><div class="form-group"><label class="form-label">Kitchen Name</label><input class="form-input" type="text" placeholder="e.g. Berber & Q" value="Berber & Q"></div><div class="form-actions"><button class="btn btn-secondary">Skip</button><button class="btn btn-primary">Next →</button></div><a class="skip-link" href="#">Skip to Home</a></div></body></html>
