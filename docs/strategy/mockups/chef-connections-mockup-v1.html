<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Palatable — Connections</title><link href="https://fonts.googleapis.com/css2?family=Cormorant_Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@600&family=Jost:wght@400;600&display=swap" rel="stylesheet"><style>:root{--paper:#F8F4ED;--card:#FFFFFF;--ink:#1A1612;--muted:#7A6F5E;--gold:#B8923C;--rule:rgba(26,22,18,0.08);}*{box-sizing:border-box;margin:0;padding:0;}body{background:var(--paper);color:var(--ink);font-family:'Jost',sans-serif;}.mockup-banner{background:var(--ink);color:var(--paper);padding:12px 56px;display:flex;justify-content:space-between;}.mockup-banner-label{font-family:'Cinzel',serif;font-weight:600;font-size:9px;letter-spacing:0.4em;color:var(--gold);text-transform:uppercase;}.page{padding:48px 56px 80px;max-width:1000px;}.page-title{font-family:'Cormorant_Garamond',serif;font-size:48px;margin-bottom:32px;}.services-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}.service-card{background:var(--card);border:1px solid var(--rule);padding:28px;text-align:center;cursor:pointer;transition:all 0.15s;}.service-card:hover{border-color:var(--gold);}.service-icon{font-size:36px;margin-bottom:12px;}.service-name{font-family:'Cormorant_Garamond',serif;font-size:18px;font-weight:600;margin-bottom:8px;}.service-status{font-family:'Jost',sans-serif;font-size:11px;color:var(--muted);margin-bottom:16px;}.service-btn{font-family:'Cinzel',serif;font-weight:600;font-size:8px;letter-spacing:0.3em;padding:10px 20px;background:var(--gold);color:white;border:none;cursor:pointer;text-transform:uppercase;}.service-card.connected .service-btn{background:transparent;color:var(--gold);border:1px solid var(--gold);}</style></head><body><div class="mockup-banner"><div class="mockup-banner-label">Connections</div></div><div class="page"><div class="page-title">Integrations</div><div class="services-grid"><div class="service-card connected"><div class="service-icon">🟩</div><div class="service-name">Square</div><div class="service-status">Connected · 12 May</div><div class="service-btn">Settings</div></div><div class="service-card connected"><div class="service-icon">🔷</div><div class="service-name">Resy</div><div class="service-status">Connected · 8 May</div><div class="service-btn">Settings</div></div><div class="service-card"><div class="service-icon">💳</div><div class="service-name">Stripe</div><div class="service-status">Not connected</div><div class="service-btn">Connect</div></div><div class="service-card"><div class="service-icon">📅</div><div class="service-name">Google Calendar</div><div class="service-status">Not connected</div><div class="service-btn">Connect</div></div></div></div></body></html>
