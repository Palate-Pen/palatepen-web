<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Palatable — Settings</title><link href="https://fonts.googleapis.com/css2?family=Cormorant_Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@600&family=Jost:wght@400;600&display=swap" rel="stylesheet"><style>:root{--paper:#F8F4ED;--card:#FFFFFF;--ink:#1A1612;--muted:#7A6F5E;--gold:#B8923C;--rule:rgba(26,22,18,0.08);}*{box-sizing:border-box;margin:0;padding:0;}body{background:var(--paper);color:var(--ink);font-family:'Jost',sans-serif;}.mockup-banner{background:var(--ink);color:var(--paper);padding:12px 56px;display:flex;justify-content:space-between;}.mockup-banner-label{font-family:'Cinzel',serif;font-weight:600;font-size:9px;letter-spacing:0.4em;color:var(--gold);text-transform:uppercase;}.page{padding:48px 56px 80px;max-width:800px;}.page-title{font-family:'Cormorant_Garamond',serif;font-size:48px;margin-bottom:32px;}.settings-section{background:var(--card);border:1px solid var(--rule);margin-bottom:24px;}.settings-head{padding:20px 28px;border-bottom:1px solid var(--rule);font-family:'Cinzel',serif;font-weight:600;font-size:11px;letter-spacing:0.3em;text-transform:uppercase;}.settings-row{padding:16px 28px;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center;}.settings-row:last-child{border-bottom:none;}.setting-label{font-family:'Cormorant_Garamond',serif;font-size:15px;}.setting-value{font-family:'Jost',sans-serif;font-size:11px;color:var(--muted);}.setting-toggle{width:40px;height:24px;background:var(--gold);border-radius:12px;cursor:pointer;position:relative;transition:all 0.15s;}.setting-toggle.off{background:var(--rule);}.setting-toggle::after{content:'';position:absolute;width:20px;height:20px;background:white;border-radius:50%;top:2px;left:2px;transition:left 0.15s;}.setting-toggle.off::after{left:18px;}</style></head><body><div class="mockup-banner"><div class="mockup-banner-label">Settings</div></div><div class="page"><div class="page-title">Settings</div><div class="settings-section"><div class="settings-head">Kitchen Info</div><div class="settings-row"><div class="setting-label">Kitchen name</div><div class="setting-value">Berber & Q</div></div><div class="settings-row"><div class="setting-label">Kitchen size</div><div class="setting-value">42 covers typical service</div></div><div class="settings-row"><div class="setting-label">Kitchen location</div><div class="setting-value">London, N1 6NG</div></div></div><div class="settings-section"><div class="settings-head">Preferences</div><div class="settings-row"><div class="setting-label">Auto-bank invoices</div><div class="setting-toggle"></div></div><div class="settings-row"><div class="setting-label">Looking Ahead notifications</div><div class="setting-toggle"></div></div><div class="settings-row"><div class="setting-label">Team can view Notebook</div><div class="setting-toggle off"></div></div></div><div class="settings-section"><div class="settings-head">Connections</div><div class="settings-row"><div class="setting-label">Integrations</div><div class="setting-value">Manage in Connections tab →</div></div></div></div></body></html>
